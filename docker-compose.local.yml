# Local development stack.
# Usage:  docker compose -f docker-compose.local.yml up --build
#
# The production docker-compose.yml is left untouched; this file is a
# self-contained local setup (no external Caddy network, host ports exposed,
# dependencies installed automatically on first boot).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proyectos-app-dev
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: ["sh", "/usr/local/bin/entrypoint.dev.sh"]
    volumes:
      - ./src:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./entrypoint.dev.sh:/usr/local/bin/entrypoint.dev.sh
    networks:
      - internal
    depends_on:
      - db
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - APP_NAME=Proyectos Nuevos Hub
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=proyectos
      - DB_USERNAME=proyectos
      - DB_PASSWORD=proyectos_secret_2026
      - LOG_CHANNEL=stack
      - FILESYSTEM_DISK=local
      - SESSION_DRIVER=file
      - CACHE_STORE=file

  web:
    image: nginx:alpine
    container_name: proyectos-web-dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf
    networks:
      - internal
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: proyectos-db-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=proyectos
      - POSTGRES_USER=proyectos
      - POSTGRES_PASSWORD=proyectos_secret_2026
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata_dev:
