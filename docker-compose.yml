version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proyectos-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - caddy
      - internal
    depends_on:
      - db
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=proyectos
      - DB_USERNAME=proyectos
      - DB_PASSWORD=proyectos_secret_2026
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://projectscentral.integro.net.gt
      - APP_NAME="Proyectos Nuevos Hub"
      - LOG_CHANNEL=stack
      - FILESYSTEM_DISK=local
      - SESSION_DRIVER=file
      - CACHE_DRIVER=file

  web:
    image: nginx:alpine
    container_name: proyectos-web
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - caddy
      - internal
    depends_on:
      - app
    labels:
      caddy: "projectscentral.integro.net.gt"
      caddy.reverse_proxy: "{{upstreams 80}}"

  db:
    image: postgres:16-alpine
    container_name: proyectos-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=proyectos
      - POSTGRES_USER=proyectos
      - POSTGRES_PASSWORD=proyectos_secret_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

networks:
  caddy:
    external: true
  internal:
    driver: bridge

volumes:
  pgdata:
